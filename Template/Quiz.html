<!DOCTYPE html>
<html>
<head>
    <title>Take the Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">
    <div class="container py-4">
        <h2 class="text-center mb-4">Rate how much you agree (1 = Disagree, 5 = Agree)</h2>
        <form action="/submit" method="POST">
            {% for q in questions %}
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ q.question }}</h5>
                    <div class="d-flex justify-content-around mt-3">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="{{ q.id }}" value="1" required>
                            <label class="form-check-label">1</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="{{ q.id }}" value="2">
                            <label class="form-check-label">2</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="{{ q.id }}" value="3">
                            <label class="form-check-label">3</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="{{ q.id }}" value="4">
                            <label class="form-check-label">4</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="{{ q.id }}" value="5">
                            <label class="form-check-label">5</label>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
            
            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-lg">See My Result</button>
            </div>
        </form>
    </div>
</body>
</html>
