<!DOCTYPE html>
<html>
<head>
    <title>Your Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-success text-white text-center p-5">
    <div class="container">
        <h1>Congratulations!</h1>
        <h3 class="mt-3">Your Personality Matches: <span class="fw-bold">{{ career }}</span></h3>
        
        <div class="card bg-white text-dark mt-4 p-4 shadow">
            <h4>Career Options:</h4>
            <p class="lead">{{ details }}</p>
            <p class="text-muted">Compatibility Score: {{ score }}</p>
        </div>

        <a href="/" class="btn btn-light mt-4">Try Again</a>
    </div>
</body>
</html>
